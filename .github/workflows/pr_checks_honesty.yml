name: pr_checks_honesty

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr_checks_honesty:
    name: pr_checks_honesty
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        # Standard pip's resolver treats `git+https://github.com/Vaquum/Limen`
        # and `git+https://github.com/Vaquum/Limen@v2.4.3` as two distinct
        # package URLs and aborts with `ResolutionImpossible` when both
        # appear in one install (Praxis declares the untagged form, Nexus
        # the tagged one). uv's resolver unifies the two URLs onto the
        # same package — same path Praxis and Nexus use in their own CI.
        uses: astral-sh/setup-uv@v4
      - name: Set up honesty test venv
        run: python -m venv .venv-honesty
      - name: Install project + deps
        # Installs the package in editable mode so the tests import
        # `backtest_simulator.honesty` from source. The honesty
        # module only depends on `nexus.core.*` plus standard
        # library; no ClickHouse / Praxis runtime is required for
        # the unit-level gate.
        run: |
          uv pip install --python .venv-honesty/bin/python -e '.[integration]'
          uv pip install --python .venv-honesty/bin/python pytest
      - name: Run honesty gate suite
        # Every test in `tests/honesty/` pins one Part 2 invariant
        # (capital conservation, lifecycle, declared-stop, r_per_trade,
        # determinism, lookahead, split alignment). Plus the mutation
        # tests injected alongside. A red here blocks merge.
        run: |
          .venv-honesty/bin/python -m pytest tests/honesty/ -v --tb=short
