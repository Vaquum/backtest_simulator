name: pr_checks_lint

on:
  pull_request:
    branches: [main]
    # `edited` is required so the budget-raise ratchet re-runs when a
    # reviewer or author adds the `[budget-raise: <path>: <reason>]`
    # marker to the PR body after the initial push.
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr_checks_lint:
    name: pr_checks_lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Bumped from 3.11 → 3.12 to match the honesty gate. The
          # `.[integration]` install pulls in vaquum-praxis which
          # declares `requires-python>=3.12`. Keeping the lint gate on
          # 3.11 would force a Python-version skew between the two
          # workflows, with a lint coverage step that can't import the
          # very package it's measuring.
          python-version: '3.12'
      - name: Install uv
        # Standard pip's resolver treats `git+https://github.com/Vaquum/Limen`
        # and `git+https://github.com/Vaquum/Limen@v2.4.3` as two distinct
        # package URLs and aborts with `ResolutionImpossible` when both
        # appear in one install (Praxis declares the untagged form, Nexus
        # the tagged one). uv's resolver unifies the two URLs onto the
        # same package — same path Praxis and Nexus use in their own CI.
        uses: astral-sh/setup-uv@v4
      - name: Set up lint venv
        run: python -m venv .venv-lint

      - name: Install gate toolchain
        run: |
          uv pip install --python .venv-lint/bin/python \
            'ruff==0.15.11' \
            'vulture>=2.14' \
            'coverage[toml]>=7.6' \
            pytest
          # The coverage step runs `pytest tests/` across every test
          # file, including the honesty and launcher suites that import
          # nexus / praxis / limen / polars at module scope. Without the
          # sibling-library install we'd collect 0 tests from those
          # paths (via tests/conftest.py's collect_ignore_glob skip),
          # which drops coverage to 0% and fails the floor gate. Install
          # the `.[integration]` extra so the lint gate sees the same
          # test surface as the honesty gate.
          # Credential helper: SIBLING_INSTALL_TOKEN is provisioned in
          # Repo Settings → Secrets; the extra pins Praxis/Nexus/Limen
          # via git+https URLs that resolve through that PAT.
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.SIBLING_INSTALL_TOKEN }}@github.com" > ~/.git-credentials
          uv pip install --python .venv-lint/bin/python '.[integration]'

      - name: Run ruff lint (bloat-mechanical rules active)
        run: .venv-lint/bin/python -m ruff check backtest_simulator tools tests scripts

      - name: Module line-count budget gate
        run: .venv-lint/bin/python scripts/check_module_budgets.py

      - name: Module docstring gate
        run: .venv-lint/bin/python scripts/check_module_docstrings.py

      - name: File size balance gate
        run: .venv-lint/bin/python scripts/check_file_size_balance.py

      - name: Test/code SLOC ratio gate
        run: .venv-lint/bin/python scripts/check_test_code_ratio.py

      - name: Dead-code (vulture)
        run: .venv-lint/bin/python -m vulture backtest_simulator/ --min-confidence 80

      - name: No-swallowed-violations gate
        # AST gate. Forbids any `except` (bare, dotted, or aliased)
        # that catches HonestyViolation or any subclass under
        # backtest_simulator/ or tests/. Honesty violations must reach
        # the test boundary; production code can never swallow them.
        run: .venv-lint/bin/python scripts/check_no_swallowed_violations.py

      - name: Coverage floor gate
        # Hard-fail only: no soft-fail markers, no pipeline bypass. If
        # pytest blows up during the coverage run the gate fails exactly
        # as loudly as if coverage were below the floor — that is the
        # point. Vacuous-pass when source has no statements (pre-M1
        # state); the script handles that boundary.
        run: |
          .venv-lint/bin/python -m coverage run --branch --source=backtest_simulator \
            -m pytest tests/ -q
          .venv-lint/bin/python -m coverage json -o coverage.json
          .venv-lint/bin/python scripts/check_coverage_floor.py

      - name: Budget-raise ratchet gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=1
          .venv-lint/bin/python scripts/check_budget_ratchet.py \
            --base-ref "origin/$BASE_REF" \
            --pr-number "$PR_NUMBER"
